name: TypeScript CI

on:
  push:
    branches: ["main", "master"]
    tags: ["v*"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and type-check
        run: npm test

      - name: Validate package contents
        run: npm run pack:dry-run

  smoke-test:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install, build, and pack
        run: |
          npm ci
          npm run build
          TARBALL=$(npm pack 2>/dev/null | tail -1)
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Install from tarball in clean directory
        run: |
          mkdir -p .scratch/mistral-ocr-smoke
          cd .scratch/mistral-ocr-smoke
          npm init -y --silent
          npm install "${{ github.workspace }}/${{ env.TARBALL }}"

      - name: Verify CLI from installed package
        run: |
          cd .scratch/mistral-ocr-smoke
          npx mistral-ocr --help | grep -q "Usage:"

      - name: Verify library exports
        run: |
          cd .scratch/mistral-ocr-smoke
          node --input-type=module <<'EOF'
          const mod = await import("mistral-ocr");
          const expected = [
            "convertPdf",
            "convertPdfBatch",
            "createOcrBatch",
            "waitForOcrBatch",
            "listOcrBatchOutputs",
            "markdownToDocx",
            "createMistralClient",
            "buildMarkdownFromOcrResponse",
            "extractImagesFromOcrResponse",
            "writeExtractedImages",
          ];

          for (const key of expected) {
            if (!(key in mod)) {
              throw new Error(`Missing export: ${key}`);
            }
          }

          console.log("Installed package exports verified");
          EOF

  live-batch-smoke:
    needs: smoke-test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    env:
      MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Skip when MISTRAL_API_KEY is not configured
        if: env.MISTRAL_API_KEY == ''
        run: echo "MISTRAL_API_KEY is not configured; skipping live batch OCR smoke."

      - name: Install and build
        if: env.MISTRAL_API_KEY != ''
        run: |
          npm ci
          npm run build

      - name: Create tiny PDF fixture
        if: env.MISTRAL_API_KEY != ''
        run: |
          mkdir -p .scratch/live-batch
          node --input-type=module <<'EOF'
          import { writeFileSync } from "node:fs";

          const objects = [
            "<< /Type /Catalog /Pages 2 0 R >>",
            "<< /Type /Pages /Kids [3 0 R] /Count 1 >>",
            "<< /Type /Page /Parent 2 0 R /MediaBox [0 0 300 144] /Contents 4 0 R /Resources << /Font << /F1 5 0 R >> >> >>",
            "<< /Length 56 >>\nstream\nBT /F1 18 Tf 36 96 Td (Mistral OCR batch smoke) Tj ET\nendstream",
            "<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>",
          ];
          let pdf = "%PDF-1.4\n";
          const offsets = [0];

          for (const [index, body] of objects.entries()) {
            offsets.push(Buffer.byteLength(pdf));
            pdf += `${index + 1} 0 obj\n${body}\nendobj\n`;
          }

          const xrefOffset = Buffer.byteLength(pdf);
          pdf += `xref\n0 ${objects.length + 1}\n0000000000 65535 f \n`;
          for (const offset of offsets.slice(1)) {
            pdf += `${String(offset).padStart(10, "0")} 00000 n \n`;
          }
          pdf += `trailer\n<< /Root 1 0 R /Size ${objects.length + 1} >>\nstartxref\n${xrefOffset}\n%%EOF\n`;

          writeFileSync(".scratch/live-batch/smoke.pdf", pdf);
          EOF

      - name: Run live batch OCR smoke
        if: env.MISTRAL_API_KEY != ''
        run: |
          node build/cli.js batch .scratch/live-batch/smoke.pdf --output-dir .scratch/live-batch/out --no-docx --no-images --poll-interval 10 --timeout 900
          test -s .scratch/live-batch/out/smoke.md

  publish:
    needs: [test, smoke-test, live-batch-smoke]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm for Trusted Publishing
        run: |
          npm install -g npm@11.6.2
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Validate release tag
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "${GITHUB_REF_NAME}" != "v${PACKAGE_VERSION}" ]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} does not match package version ${PACKAGE_VERSION}. Expected v${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Check npm version is unpublished
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "::error::${PACKAGE_NAME}@${PACKAGE_VERSION} already exists on npm. Bump package.json before tagging."
            exit 1
          fi

      - name: Validate before publish
        run: npm run verify

      - name: Publish to npm
        run: npm publish --access public

  post-publish-check:
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Wait for npm propagation
        run: sleep 30

      - name: Install from npm
        run: |
          mkdir -p .scratch/mistral-ocr-post-publish
          cd .scratch/mistral-ocr-post-publish
          npm init -y --silent
          npm install mistral-ocr@latest

      - name: Verify installed package
        run: |
          cd .scratch/mistral-ocr-post-publish
          npx mistral-ocr --help | grep -q "Usage:"
          node --input-type=module <<'EOF'
          const mod = await import("mistral-ocr");
          if (typeof mod.convertPdf !== "function") {
            throw new Error("convertPdf export missing");
          }
          console.log("Post-publish package verification passed");
          EOF
